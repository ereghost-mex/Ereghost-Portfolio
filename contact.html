<!-- Hero -->

<section class="contact-section">

<div class="container">

<div class="text-center mb-5">

<h1 class="display-4">

Get In Touch

</h1>

<p class="text-muted">

Let's build something amazing together.

</p>

</div>

<div class="row">

<!-- Form -->

<div class="col-lg-7">

<div class="contact-card">

<form id="contactForm">

<div class="form-outline mb-4">

<input
type="text"
id="name"
class="form-control"
required>

<label class="form-label">

Full Name

</label>

</div>

<div class="form-outline mb-4">

<input
type="email"
id="email"
class="form-control"
required>

<label class="form-label">

Email

</label>

</div>

<div class="form-outline mb-4">

<input
type="text"
id="subject"
class="form-control">

<label class="form-label">

Subject

</label>

</div>

<div class="form-outline mb-4">

<textarea
class="form-control"
rows="6"
id="message"
required></textarea>

<label class="form-label">

Message

</label>

</div>

<button
class="btn btn-warning w-100"
type="submit">

Send Message

</button>

</form>

</div>

</div>

<div class="info-card">

+91 **********

</p>

</div>

<div class="info-card">

<p>

Purnea, India

</p>

</div>
